<section class="login-layout">
  <div class="login-copy">
    <p class="eyebrow">Zona dealer</p>
    <h1>Autentificare consultant</h1>
    <p>
      Accesul in panoul dealer este disponibil doar dupa autentificare. De aici
      pot fi urmarite cererile de vanzare si masinile listate.
    </p>
    <p class="hint">User: <strong>dealer</strong> / Parola: <strong>dealer</strong></p>
  </div>

  <form class="login-form" #loginForm="ngForm" (ngSubmit)="login()">
    <label>
      Username
      <input type="text" name="username" required [(ngModel)]="credentials.username" />
    </label>

    <label>
      Parola
      <input type="password" name="password" required [(ngModel)]="credentials.password" />
    </label>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <button type="submit" [disabled]="loginForm.invalid">Login</button>
  </form>
</section>
