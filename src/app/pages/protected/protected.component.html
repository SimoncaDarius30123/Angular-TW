<section class="protected-panel" *ngIf="user$ | async as user">
  <p class="eyebrow">Panou dealer</p>
  <h1>Bine ai venit, {{ user.username }}</h1>
  <p>
    Ai acces la zona interna AutoDrive. Aici sunt centralizate cererile primite
    si masinile care au nevoie de actualizare.
  </p>

  <dl>
    <div *ngFor="let metric of metrics">
      <dt>{{ metric.label }}</dt>
      <dd>{{ metric.value }}</dd>
    </div>
  </dl>

  <div class="task-panel">
    <h2>Prioritati</h2>
    <ul>
      <li *ngFor="let task of tasks">{{ task }}</li>
    </ul>
  </div>

  <a routerLink="/vinde">Inregistreaza o masina</a>
</section>
